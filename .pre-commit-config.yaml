repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Type checking with ty (Astral's type checker)
  # All errors fixed - runs on push to catch issues before CI
  # To run manually: ty check typer_bot
  - repo: local
    hooks:
      - id: ty-check
        name: ty type checker
        entry: ty check typer_bot
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [push]
