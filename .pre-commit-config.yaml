repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.0
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format

  # Type checking with ty (Astral's type checker)
  # Run on push (not every commit) - balance: fast commits, catch issues before CI
  # To run manually: ty check typer_bot
  - repo: local
    hooks:
      - id: ty-check
        name: ty type checker
        entry: uv run ty check typer_bot
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        stages: [pre-push]
