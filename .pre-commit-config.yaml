repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Type checking with ty (Astral's type checker)
  # Note: Currently has 19 errors - fix before making required
  # To run manually: ty check typer_bot
  - repo: local
    hooks:
      - id: ty-check
        name: ty type checker
        entry: ty check typer_bot
        language: system
        types: [python]
        pass_filenames: false
        # Change to true once all type errors are fixed
        always_run: false
